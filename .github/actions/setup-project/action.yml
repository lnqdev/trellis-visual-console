name: Setup Trellis project
description: Install the pinned Node, pnpm and Rust toolchains for CI jobs.
inputs:
  rust-target:
    description: Optional Rust target to install before building.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.33.0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.12.0
        cache: pnpm
    - name: Install Linux desktop dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: >-
        sudo apt-get update &&
        sudo apt-get install -y
        libglib2.0-dev
        libgtk-3-dev
        libwebkit2gtk-4.1-dev
        libayatana-appindicator3-dev
        librsvg2-dev
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.88.0
        components: rustfmt,clippy
    - name: Install Rust target
      if: inputs.rust-target != ''
      shell: bash
      run: rustup target add "${{ inputs.rust-target }}"
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Install JavaScript dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
